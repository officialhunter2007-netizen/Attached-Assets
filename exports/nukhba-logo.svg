<svg width="512" height="160" viewBox="0 0 512 160" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="شعار نُخبة">
  <defs>
    <linearGradient id="lg-border" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A" />
      <stop offset="0.45" stop-color="#F59E0B" />
      <stop offset="1" stop-color="#92400E" />
    </linearGradient>
    <linearGradient id="lg-bg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1730" />
      <stop offset="1" stop-color="#0c0a1a" />
    </linearGradient>
    <linearGradient id="lg-letter" x1="0" y1="32" x2="160" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A" />
      <stop offset="0.6" stop-color="#F59E0B" />
      <stop offset="1" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="lg-text" x1="0" y1="0" x2="0" y2="100%" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A" />
      <stop offset="0.55" stop-color="#F59E0B" />
      <stop offset="1" stop-color="#D97706" />
    </linearGradient>
    <radialGradient id="lg-glow" cx="80" cy="80" r="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B" stop-opacity="0.12" />
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0" />
    </radialGradient>
    <filter id="lg-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#F59E0B" flood-opacity="0.35" />
    </filter>
    <filter id="lg-dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="lg-clip">
      <rect x="5" y="5" width="150" height="150" rx="45" />
    </clipPath>
  </defs>

  <rect width="512" height="160" fill="#0c0a1a" rx="20" />

  <g transform="translate(0,0)">
    <rect x="2.5" y="2.5" width="155" height="155" rx="47.5" fill="url(#lg-border)" filter="url(#lg-shadow)" />
    <rect x="8.3" y="8.3" width="143.3" height="143.3" rx="41.6" fill="url(#lg-bg)" />
    <rect x="8.3" y="8.3" width="143.3" height="143.3" rx="41.6" fill="url(#lg-glow)" />
    <rect x="13.3" y="13.3" width="133.3" height="133.3" rx="36.6" fill="none" stroke="#F59E0B" stroke-width="1.3" stroke-opacity="0.25" />
    <line x1="80" y1="26" x2="80" y2="133" stroke="#F59E0B" stroke-width="1.2" stroke-opacity="0.1" />
    <line x1="26" y1="80" x2="133" y2="80" stroke="#F59E0B" stroke-width="1.2" stroke-opacity="0.1" />
    <line x1="36" y1="36" x2="123" y2="123" stroke="#F59E0B" stroke-width="1.2" stroke-opacity="0.08" />
    <line x1="123" y1="36" x2="36" y2="123" stroke="#F59E0B" stroke-width="1.2" stroke-opacity="0.08" />
    <text x="80" y="110" text-anchor="middle" font-family="'Tajawal','Cairo','Arial',sans-serif" font-size="86" font-weight="900" fill="url(#lg-letter)" clip-path="url(#lg-clip)">ن</text>
    <circle cx="106" cy="40" r="11.6" fill="#F59E0B" filter="url(#lg-dot-glow)" />
    <circle cx="106" cy="40" r="6" fill="#FFFBEB" />
  </g>

  <text x="190" y="105" font-family="'Tajawal','Cairo','Arial',sans-serif" font-size="78" font-weight="900" fill="url(#lg-text)" letter-spacing="4">نُخبة</text>
</svg>
