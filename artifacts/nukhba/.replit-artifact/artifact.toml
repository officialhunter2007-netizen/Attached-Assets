kind = "web"
previewPath = "/"
title = "نُخبة - المنصة التعليمية"
version = "1.0.0"
id = "artifacts/nukhba"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19388

[services.development]
run = "pnpm --filter @workspace/nukhba run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nukhba", "run", "build" ]
publicDir = "artifacts/nukhba/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19388"
BASE_PATH = "/"
