kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

# Push the schema during the build phase so it happens ONCE per deploy
# instead of on every autoscale cold start. The build phase has the
# production DATABASE_URL available, so push targets the right DB.
[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db push-force"]

[services.production.build.env]
NODE_ENV = "production"

# Run is now stripped down to just node — every container cold start is fast,
# no DB round-trip on startup.
[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
