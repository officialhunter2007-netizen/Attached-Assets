version: "3.9"

services:
  # ─── قاعدة البيانات PostgreSQL (على نفس الـ VPS) ─────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nukhba}
      POSTGRES_USER: ${POSTGRES_USER:-nukhba_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nukhba_user} -d ${POSTGRES_DB:-nukhba}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── الخادم الخلفي (Express API) ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-nukhba_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nukhba}
      SESSION_SECRET: ${SESSION_SECRET}
      # ─── OpenRouter (المعلّم الذكي - مفتاح مستقل، يبدأ بـ sk-or-) ───
      # هذا المفتاح ضروري لتشغيل المعلّم الذكي. احصل عليه من openrouter.ai/keys
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # ─── fal.ai (الصور التوضيحية للمعلّم - FLUX schnell) ───────────
      # اختياري: لو لم تضعه ستعمل المنصة بدون صور توضيحية. القيمة:
      # المفتاح الكامل من https://fal.ai/dashboard/keys (شكله KEY_ID:KEY_SECRET).
      # التكلفة: ≈ $0.003 لكل صورة (3 جواهر).
      FAL_KEY: ${FAL_KEY:-}
      # ─── OpenAI / Anthropic (اختياري - لو احتجت مزوّدات أخرى) ──────
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      AI_INTEGRATIONS_OPENAI_API_KEY: ${AI_INTEGRATIONS_OPENAI_API_KEY:-}
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: ${AI_INTEGRATIONS_ANTHROPIC_BASE_URL:-https://openrouter.ai/api/v1}
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ${AI_INTEGRATIONS_ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      UNLIMITED_ACCESS_EMAILS: ${UNLIMITED_ACCESS_EMAILS:-}
      APP_DOMAIN: ${APP_DOMAIN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # ─── الصور التوضيحية (تخزين دائم على القرص) ────────────────────
      # المجلد داخل الحاوية يطابق volume أدناه. التغيير هنا يتطلّب
      # تحديث docker-compose.yml كذلك.
      TEACHER_IMAGE_DIR: /data/teacher-images
      # سعة التخزين بالميغابايت قبل تشغيل LRU eviction.
      TEACHER_IMAGE_CACHE_MB: ${TEACHER_IMAGE_CACHE_MB:-500}
    volumes:
      # تخزين دائم للصور التوضيحية المولّدة، لا يُمسح عند إعادة البناء.
      - teacher_images:/data/teacher-images

  # ─── Nginx (الواجهة الأمامية + reverse proxy) ────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro

  # ─── Certbot (تجديد شهادة SSL تلقائياً) ──────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  certbot_certs:
  certbot_webroot:
  teacher_images:
