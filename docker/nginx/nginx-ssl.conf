worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    # ضغط الاستجابات (يُلغى لمسارات SSE تحت /api/)
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ─── HTTP: إعادة توجيه إلى HTTPS ─────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS: الخادم الرئيسي ────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name DOMAIN_PLACEHOLDER;

        ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000" always;

        root /usr/share/nginx/html;
        index index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ═══════════════════════════════════════════════════════════════
        # طلبات API → Express (يحافظ على بادئة /api/)
        # ضروري: تعطيل التخزين المؤقت لكل مسارات SSE (المعلّم الذكي
        # يبثّ chunk-by-chunk عبر text/event-stream — لو ظلّ proxy_buffering
        # شغّالاً سيبتلع كل الـchunks ولا يصل الطالب شيء حتى نهاية الجلسة).
        # هذا كان السبب الجذري لتوقّف المعلّم الذكي عن الاستجابة في الإنتاج.
        # ═══════════════════════════════════════════════════════════════
        location /api/ {
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ── SSE / streaming essentials ─────────────────────────────
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            gzip off;
            chunked_transfer_encoding on;
            proxy_set_header Connection "";

            # مهلات طويلة للجلسات المتدفّقة (المعلّم قد يكتب 60+ ثانية)
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 10s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
